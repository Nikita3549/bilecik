services:
  db:
    image: postgres:17-alpine
    container_name: bilecik-db
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db-data:/var/postgresql/data
    ports:
      - "127.0.0.1:${DB_PORT}:5432"

volumes:
  db-data:
